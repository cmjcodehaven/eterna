<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#080808"/>
  <!-- Camera body -->
  <path d="M15 35 Q15 30 20 30 L30 30 L35 22 L65 22 L70 30 L80 30 Q85 30 85 35 L85 72 Q85 77 80 77 L20 77 Q15 77 15 72 Z"
        fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Lens outer -->
  <circle cx="50" cy="52" r="16" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <!-- Lens inner (aperture blades) -->
  <circle cx="50" cy="52" r="9" fill="url(#goldFill)" opacity="0.85"/>
  <!-- Aperture lines -->
  <line x1="50" y1="43" x2="50" y2="52" stroke="#080808" stroke-width="1.5"/>
  <line x1="50" y1="52" x2="57.8" y2="56.5" stroke="#080808" stroke-width="1.5"/>
  <line x1="50" y1="52" x2="42.2" y2="56.5" stroke="#080808" stroke-width="1.5"/>
  <!-- Top bump -->
  <rect x="42" y="26" width="10" height="5" rx="2" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#c9a24d"/>
    </linearGradient>
    <linearGradient id="goldFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#c9a24d"/>
    </linearGradient>
  </defs>
</svg>
